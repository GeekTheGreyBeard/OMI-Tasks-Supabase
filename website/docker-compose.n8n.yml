services:
  omi-tasks-supabase-n8n:
    image: n8nio/n8n:${N8N_VERSION:-2.20.6}
    container_name: omi-tasks-supabase-n8n
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_TASK_SOURCE_NAME=${N8N_TASK_SOURCE_NAME:-local-n8n}
      - DB_TYPE=sqlite
    volumes:
      - omi-tasks-supabase-n8n-data:/home/node/.n8n
    restart: unless-stopped
volumes:
  omi-tasks-supabase-n8n-data:
