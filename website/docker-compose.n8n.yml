services:
  omi-tasks-supabase-n8n:
    image: n8nio/n8n:latest
    container_name: omi-tasks-supabase-n8n
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=sqlite
    volumes:
      - omi-tasks-supabase-n8n-data:/home/node/.n8n
    restart: unless-stopped
volumes:
  omi-tasks-supabase-n8n-data:
